# =============================================
# Configuración del Proyecto - Parcial Final
# Sistema de gestión de torneos y equipos
# =============================================

spring.application.name=parcialwebbackend

# =============================================
# Configuración de Base de Datos H2 (Desarrollo)
# =============================================
spring.datasource.url=jdbc:h2:mem:parcialdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Dialecto de H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Consola H2 habilitada para revisión de datos
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =============================================
# Configuración JPA / Hibernate
# =============================================
# 'update' para que Spring cree/actualice las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# Configuración del servidor
# =============================================
server.port=8080

